<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الطلاب - نظام قفلة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.back-btn{
background:#2563eb;
color:white;
padding:12px 18px;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.page-title{
font-size:32px;
font-weight:bold;
color:#22c55e;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
}

.stat-card h2{
font-size:35px;
color:#22c55e;
}

.box{
background:#1e293b;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

.box h2{
margin-bottom:15px;
color:#22c55e;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
padding:12px;
background:#22c55e;
color:black;
border:none;
width:100%;
cursor:pointer;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

.search-box{
margin-bottom:20px;
}

.student-card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:15px;
border-right:5px solid #22c55e;
}

.student-card b{
color:#22c55e;
}

.delete-btn{
margin-top:10px;
background:#ef4444;
color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<a href="dashboard.html" class="back-btn">
⬅ العودة
</a>

<div class="page-title">
👨‍🎓 إدارة الطلاب
</div>

</div>

<div class="stats">

<div class="stat-card">
<h2 id="studentsCount">0</h2>
<p>إجمالي الطلاب</p>
</div>

</div>

<div class="box">

<h2>➕ إضافة طالب جديد</h2>

<input id="studentNumber" placeholder="الرقم المدرسي">

<input id="name" placeholder="اسم الطالب">

<select id="grade">
<option value="">اختر الصف</option>
<option>الأول</option>
<option>الثاني</option>
<option>الثالث</option>
<option>الرابع</option>
<option>الخامس</option>
<option>السادس</option>
<option>السابع</option>
<option>الثامن</option>
<option>التاسع</option>
</select>

<select id="section">
<option value="">اختر الشعبة</option>
<option>أ</option>
<option>ب</option>
</select>

<select id="gender">
<option value="">اختر الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
</select>

<input id="parentPhone" placeholder="رقم ولي الأمر">

<button onclick="addStudent()">
➕ إضافة الطالب
</button>

</div>

<div class="search-box">
<input id="searchStudent" placeholder="🔍 البحث عن طالب">
</div>

<h2>📋 قائمة الطلاب</h2>

<div id="list"></div>

</div>

<script type="module">

import {
auth,
onAuthStateChanged,
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./firebase.js";

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

const col = collection(db,"students");

window.addStudent = async function(){

if(
!studentNumber.value ||
!name.value ||
!grade.value ||
!section.value
){
alert("يرجى إدخال البيانات المطلوبة");
return;
}

await addDoc(col,{
studentNumber: studentNumber.value,
name: name.value,
grade: grade.value,
section: section.value,
gender: gender.value,
parentPhone: parentPhone.value
});

studentNumber.value="";
name.value="";
grade.value="";
section.value="";
gender.value="";
parentPhone.value="";

loadStudents();

}

async function loadStudents(){

const data = await getDocs(col);

list.innerHTML="";

let count = 0;

data.forEach(d=>{

count++;

let s = d.data();

list.innerHTML += `
<div class="student-card">

<b>🆔 الرقم المدرسي:</b>
${s.studentNumber || "-"}

<br><br>

<b>👨‍🎓 اسم الطالب:</b>
${s.name || "-"}

<br><br>

<b>🏫 الصف:</b>
${s.grade || "-"}

<br><br>

<b>📚 الشعبة:</b>
${s.section || "-"}

<br><br>

<b>👤 الجنس:</b>
${s.gender || "-"}

<br><br>

<b>📞 ولي الأمر:</b>
${s.parentPhone || "-"}

<br><br>

<button
class="delete-btn"
onclick="deleteStudent('${d.id}')">
🗑️ حذف الطالب
</button>

</div>
`;

});

document.getElementById("studentsCount").textContent = count;

}

window.deleteStudent = async function(id){

if(!confirm("هل تريد حذف الطالب؟")){
return;
}

await deleteDoc(doc(db,"students",id));

loadStudents();

}

loadStudents();

</script>

</body>
</html>
