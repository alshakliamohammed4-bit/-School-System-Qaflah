<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إدارة الطلاب</title>

<style>
body{
font-family:tahoma;
background:#f4f7f5;
margin:0;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
display:block;
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#16a34a;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>

<body>

<h2>👨‍🎓 إدارة الطلاب</h2>

<!-- 🟢 نموذج الإضافة -->
<input id="name" placeholder="اسم الطالب">
<input id="grade" placeholder="الصف">
<input id="section" placeholder="الشعبة">
<input id="parentPhone" placeholder="رقم ولي الأمر">

<button onclick="addStudent()">➕ إضافة طالب</button>

<hr>

<!-- 🟢 عرض الطلاب -->
<div id="list"></div>

<!-- 🟢 Firebase + Logic -->
<script type="module">

import { db, collection, addDoc, getDocs, deleteDoc, doc } from "./firebase.js";

const col = collection(db,"students");

/* 🟢 تحميل الطلاب */
async function loadStudents(){

const snap = await getDocs(col);
list.innerHTML = "";

snap.forEach(d=>{
const s = d.data();

list.innerHTML += `
<div class="card">

👨‍🎓 <b>الاسم:</b> ${s.name}<br>
🏫 <b>الصف:</b> ${s.grade}<br>
📚 <b>الشعبة:</b> ${s.section}<br>
📞 <b>الهاتف:</b> ${s.parentPhone}<br>

<button onclick="deleteStudent('${d.id}')">🗑 حذف</button>

</div>
`;
});
}

/* 🟢 إضافة طالب */
window.addStudent = async function(){

await addDoc(col,{
name: name.value,
grade: grade.value,
section: section.value,
parentPhone: parentPhone.value
});

name.value = "";
grade.value = "";
section.value = "";
parentPhone.value = "";

loadStudents();
};

/* 🟢 حذف طالب */
window.deleteStudent = async function(id){
await deleteDoc(doc(db,"students",id));
loadStudents();
};

/* تشغيل عند فتح الصفحة */
loadStudents();

</script>

</body>
</html>
