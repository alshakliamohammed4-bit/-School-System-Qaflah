<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إدارة الطلاب</title><style>

body{
font-family:'Tahoma',Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 8px #ccc;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
border:1px solid #ccc;
border-radius:5px;
font-family:'Tahoma',Arial,sans-serif;
}

button{
padding:10px;
background:green;
color:white;
border:none;
width:100%;
cursor:pointer;
border-radius:5px;
font-size:16px;
}

button:hover{
opacity:.9;
}

.student-card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 5px #ccc;
}

</style></head><body><h1>👨‍🎓 إدارة الطلاب</h1><div class="box"><input id="studentNumber" placeholder="الرقم المدرسي"><input id="name" placeholder="اسم الطالب"><select id="grade">
<option value="">اختر الصف</option>
<option>الأول</option>
<option>الثاني</option>
<option>الثالث</option>
<option>الرابع</option>
<option>الخامس</option>
<option>السادس</option>
<option>السابع</option>
<option>الثامن</option>
<option>التاسع</option>
</select><select id="section">
<option value="">اختر الشعبة</option>
<option>أ</option>
<option>ب</option>
</select><select id="gender">
<option value="">اختر الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
</select><input id="parentPhone" placeholder="رقم ولي الأمر"><button onclick="addStudent()">
➕ إضافة طالب
</button></div><h2>📋 قائمة الطلاب</h2><div id="list"></div><script type="module">

import {
auth,
onAuthStateChanged,
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./firebase.js";

// حماية الصفحة
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

const col = collection(db,"students");

// إضافة طالب
window.addStudent = async function(){

if(
!studentNumber.value ||
!name.value ||
!grade.value ||
!section.value
){
alert("يرجى إدخال البيانات المطلوبة");
return;
}

await addDoc(col,{
studentNumber: studentNumber.value,
name: name.value,
grade: grade.value,
section: section.value,
gender: gender.value,
parentPhone: parentPhone.value
});

// تفريغ الحقول
studentNumber.value = "";
name.value = "";
grade.value = "";
section.value = "";
gender.value = "";
parentPhone.value = "";

loadStudents();

}

// عرض الطلاب
async function loadStudents(){

const data = await getDocs(col);

list.innerHTML = "";

data.forEach(d => {

let s = d.data();

list.innerHTML += `
<div class="student-card">

<b>🆔 الرقم المدرسي:</b>
${s.studentNumber || "-"}<br><br>

<b>👨‍🎓 اسم الطالب:</b>
${s.name || "-"}<br><br>

<b>🏫 الصف:</b>
${s.grade || "-"}<br><br>

<b>📚 الشعبة:</b>
${s.section || "-"}<br><br>

<b>👤 الجنس:</b>
${s.gender || "-"}<br><br>

<b>📞 رقم ولي الأمر:</b>
${s.parentPhone || "-"}<br><br>

<button onclick="deleteStudent('${d.id}')">
🗑️ حذف الطالب
</button>

</div>
`;

});

}

// حذف طالب
window.deleteStudent = async function(id){

if(!confirm("هل تريد حذف هذا الطالب؟")){
return;
}

await deleteDoc(
doc(db,"students",id)
);

loadStudents();

}

loadStudents();

</script></body>
</html>
