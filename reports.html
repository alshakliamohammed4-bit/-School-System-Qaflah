import { auth, onAuthStateChanged } from "./firebase.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التقارير وكشوف الدرجات</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b5ed7;
}

select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#0b5ed7;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

.report{
margin-top:20px;
padding:20px;
background:#eef4ff;
border-radius:10px;
}

@media print{
button{
display:none;
}
body{
background:white;
}
}

</style>
</head>

<body>

<div class="container">

<h1>📊 كشف درجات الطالب</h1>

<select id="student"></select>

<button onclick="loadReport()">
عرض التقرير
</button>

<div id="report"></div>

</div>

<script type="module">

import {
db,
collection,
getDocs
}
from "./firebase.js";

let students=[];

async function loadStudents(){

const snapshot =
await getDocs(collection(db,"students"));

const select =
document.getElementById("student");

select.innerHTML="";

snapshot.forEach((doc)=>{

const s=doc.data();

students.push({
id:doc.id,
name:s.name,
class:s.class
});

select.innerHTML += `
<option value="${doc.id}">
${s.name}
</option>
`;

});

}

window.loadReport = async function(){

const studentId =
document.getElementById("student").value;

const gradesSnapshot =
await getDocs(collection(db,"grades"));

let gradeData = null;

gradesSnapshot.forEach((doc)=>{

const g = doc.data();

if(g.studentId === studentId){

gradeData = g;

}

});

const student =
students.find(s => s.id === studentId);

if(!gradeData){

document.getElementById("report").innerHTML =
"<h3>لا توجد درجات لهذا الطالب</h3>";

return;

}

document.getElementById("report").innerHTML = `
<div class="report">

<h2>كشف درجات الطالب</h2>

<p><strong>الاسم:</strong> ${student.name}</p>

<p><strong>الصف:</strong> ${student.class}</p>

<hr>

<p>رياضيات: ${gradeData.math}</p>

<p>إنجليزي: ${gradeData.english}</p>

<p>علوم: ${gradeData.science}</p>

<hr>

<p><strong>المجموع:</strong> ${gradeData.total}</p>

<p><strong>المعدل:</strong> ${gradeData.average}</p>

<button onclick="window.print()">
🖨️ طباعة الكشف
</button>

</div>
`;

}

loadStudents();

</script>

</body>
</html>
