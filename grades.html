<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدرجات</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h1>📝 إدارة الدرجات</h1>

<div class="box">

<input id="name" placeholder="اسم الطالب">
<input id="subject" placeholder="المادة">
<input id="grade" placeholder="الدرجة">

<button onclick="addGrade()">إضافة درجة</button>

</div>

<h2>📋 قائمة الدرجات</h2>

<div id="list"></div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./firebase.js";

const col = collection(db,"grades");


// ➕ إضافة درجة
window.addGrade = async function(){

const name = document.getElementById("name").value;
const subject = document.getElementById("subject").value;
const grade = document.getElementById("grade").value;

await addDoc(col,{
name: name,
subject: subject,
grade: grade
});

// تنظيف الحقول بعد الإضافة
document.getElementById("name").value = "";
document.getElementById("subject").value = "";
document.getElementById("grade").value = "";

loadGrades();
}


// 📋 عرض الدرجات
async function loadGrades(){

const data = await getDocs(col);

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(d=>{

let g = d.data();

list.innerHTML += `
<div class="box">
<b>الطالب:</b> ${g.name}<br>
<b>المادة:</b> ${g.subject}<br>
<b>الدرجة:</b> ${g.grade}<br><br>

<button onclick="deleteGrade('${d.id}')">
حذف
</button>
</div>
`;
});

}


// ❌ حذف درجة
window.deleteGrade = async function(id){

await deleteDoc(doc(db,"grades",id));

loadGrades();

}


// تشغيل العرض عند فتح الصفحة
loadGrades();

</script>

</body>
</html>
