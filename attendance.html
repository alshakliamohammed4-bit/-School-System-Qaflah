<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحضور والغياب</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b5ed7;
}

.student{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:8px 0;
background:#eef4ff;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
cursor:pointer;
color:white;
border-radius:5px;
}

.present{
background:#198754;
}

.absent{
background:#dc3545;
}

</style>
</head>

<body>

<div class="container">

<h1>📅 الحضور والغياب</h1>

<p>
التاريخ:
<span id="today"></span>
</p>

<div id="students"></div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs
}
from "./firebase.js";

document.getElementById("today").innerText =
new Date().toLocaleDateString("ar");

async function loadStudents(){

const container =
document.getElementById("students");

container.innerHTML="";

const snapshot =
await getDocs(collection(db,"students"));

snapshot.forEach((doc)=>{

const s = doc.data();

container.innerHTML += `
<div class="student">

<div>
👨‍🎓 ${s.name}
<br>
🏫 ${s.class}
</div>

<div>

<button
class="present"
onclick="saveAttendance(
'${doc.id}',
'${s.name}',
'حاضر'
)">
حاضر
</button>

<button
class="absent"
onclick="saveAttendance(
'${doc.id}',
'${s.name}',
'غائب'
)">
غائب
</button>

</div>

</div>
`;

});

}

window.saveAttendance = async function(
studentId,
studentName,
status
){

await addDoc(
collection(db,"attendance"),
{
studentId,
studentName,
status,
date:new Date().toISOString()
}
);

alert(
studentName +
" : " +
status
);

}

loadStudents();

</script>

</body>
</html>
