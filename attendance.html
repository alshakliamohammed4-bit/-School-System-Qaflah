<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الحضور والغياب</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h1>📅 الحضور والغياب</h1>

<div class="box">

<input id="name" placeholder="اسم الطالب">

<select id="status">
<option value="حاضر">حاضر</option>
<option value="غائب">غائب</option>
</select>

<button onclick="addAttendance()">تسجيل</button>

</div>

<h2>📋 السجل</h2>

<div id="list"></div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./firebase.js";

const col = collection(db,"attendance");


// ➕ إضافة حضور
window.addAttendance = async function(){

const name = document.getElementById("name").value;
const status = document.getElementById("status").value;

const date = new Date().toLocaleDateString();

await addDoc(col,{
name: name,
status: status,
date: date
});

document.getElementById("name").value = "";

loadAttendance();
}


// 📋 عرض الحضور
async function loadAttendance(){

const data = await getDocs(col);

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(d=>{

let a = d.data();

list.innerHTML += `
<div class="box">
<b>الطالب:</b> ${a.name}<br>
<b>الحالة:</b> ${a.status}<br>
<b>التاريخ:</b> ${a.date}<br><br>

<button onclick="deleteAttendance('${d.id}')">
حذف
</button>
</div>
`;
});

}


// ❌ حذف سجل
window.deleteAttendance = async function(id){

await deleteDoc(doc(db,"attendance",id));

loadAttendance();

}

loadAttendance();

</script>

</body>
</html>
