<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الحضور والغياب</title><style>

body{
font-family:'Tahoma',Arial,sans-serif;
background:#f5f5f5;
padding:20px;
margin:0;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
opacity:.9;
}

</style></head><body><h1>📅 الحضور والغياب</h1><div class="box"><input id="studentNumber" placeholder="الرقم المدرسي"><select id="status">
<option value="حاضر">حاضر</option>
<option value="غائب">غائب</option>
</select><button onclick="addAttendance()">
تسجيل الحضور
</button></div><h2>📋 سجل الحضور</h2><div id="list"></div><script type="module">

import {
auth,
onAuthStateChanged,
db,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "./firebase.js";

/* حماية الصفحة */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

const attendanceCol = collection(db,"attendance");
const studentsCol = collection(db,"students");

/* إضافة حضور */
window.addAttendance = async function(){

let studentNumber =
document.getElementById("studentNumber").value;

let status =
document.getElementById("status").value;

if(!studentNumber){
alert("أدخل الرقم المدرسي");
return;
}

/* البحث عن اسم الطالب */
let studentsSnap = await getDocs(studentsCol);

let studentName = "غير معروف";

studentsSnap.forEach(s=>{
let data = s.data();
if(data.studentNumber == studentNumber){
studentName = data.name;
}
});

let date = new Date().toLocaleDateString();

await addDoc(attendanceCol,{
studentNumber: studentNumber,
studentName: studentName,
status: status,
date: date
});

document.getElementById("studentNumber").value = "";

loadAttendance();

}

/* عرض الحضور */
async function loadAttendance(){

const data = await getDocs(attendanceCol);

const list = document.getElementById("list");

list.innerHTML = "";

data.forEach(d=>{

let a = d.data();

list.innerHTML += `
<div class="box">

<b>🆔 الرقم:</b> ${a.studentNumber}<br>
<b>👨‍🎓 الاسم:</b> ${a.studentName}<br>
<b>📅 التاريخ:</b> ${a.date}<br>
<b>📌 الحالة:</b> ${a.status}<br><br>

<button onclick="deleteAttendance('${d.id}')">
🗑️ حذف
</button>

</div>
`;
});

}

/* حذف */
window.deleteAttendance = async function(id){

if(!confirm("هل تريد حذف السجل؟")) return;

await deleteDoc(doc(db,"attendance",id));

loadAttendance();

}

loadAttendance();

</script></body>
</html>
