<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:#0b5ed7;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.number{
font-size:30px;
font-weight:bold;
color:#0b5ed7;
}

.menu{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

.menu a{
background:#198754;
color:white;
text-decoration:none;
padding:15px;
text-align:center;
border-radius:8px;
}

</style>

</head>

<body>

<h1>🏫 لوحة تحكم مدرسة قفلة</h1>

<div class="grid">

<div class="card">
<h3>عدد الطلاب</h3>
<div class="number" id="studentsCount">0</div>
</div>

<div class="card">
<h3>عدد سجلات الدرجات</h3>
<div class="number" id="gradesCount">0</div>
</div>

<div class="card">
<h3>سجلات الحضور</h3>
<div class="number" id="attendanceCount">0</div>
</div>

</div>

<div class="menu">

<a href="index.html">
👨‍🎓 الطلاب
</a>

<a href="grades.html">
📝 الدرجات
</a>

<a href="reports.html">
📊 التقارير
</a>

<a href="attendance.html">
📅 الحضور والغياب
</a>

</div>

<script type="module">

import {
db,
collection,
getDocs
}
from "./firebase.js";

async function loadStats(){

const students =
await getDocs(
collection(db,"students")
);

document.getElementById(
"studentsCount"
).innerText =
students.size;

const grades =
await getDocs(
collection(db,"grades")
);

document.getElementById(
"gradesCount"
).innerText =
grades.size;

const attendance =
await getDocs(
collection(db,"attendance")
);

document.getElementById(
"attendanceCount"
).innerText =
attendance.size;

}

loadStats();

</script>

</body>
