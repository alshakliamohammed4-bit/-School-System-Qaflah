<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم</title>

<style>

body{
margin:0;
font-family:'Tahoma',Arial,sans-serif;
background:#0f172a;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#111827;
}

.logout{
background:red;
color:white;
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

header{
background:linear-gradient(135deg,#0b5ed7,#22c55e);
padding:40px 20px;
text-align:center;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
text-decoration:none;
color:white;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#111827;
}

</style>

</head>

<body>

<!-- الشريط العلوي -->
<div class="topbar">
<h3>🏫 نظام مدرسة قفلة</h3>

<button class="logout" onclick="logout()">
🚪 تسجيل خروج
</button>
</div>

<!-- الهيدر -->
<header>
<h1>لوحة التحكم</h1>
<p>إدارة الطلاب - الدرجات - الحضور - الشهادات</p>
</header>

<!-- المحتوى -->
<div class="container">

<div class="grid">

<a class="card" href="students.html">👨‍🎓 الطلاب</a>
<a class="card" href="grades.html">📝 الدرجات</a>
<a class="card" href="attendance.html">📅 الحضور</a>
<a class="card" href="certificate.html">🎓 الشهادات</a>
<a class="card" href="results.html">📊 النتائج</a>
<a class="card" href="about.html">ℹ️ عن النظام</a>

</div>

</div>

<script type="module">

import {
auth,
onAuthStateChanged,
signOut
} from "./firebase.js";

/* 🔐 حماية الصفحة */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

/* 🚪 تسجيل خروج */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
