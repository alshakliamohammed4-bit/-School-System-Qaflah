<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم - نظام قفلة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#111827;
box-shadow:0 2px 10px rgba(0,0,0,.3);
}

.school{
font-size:22px;
font-weight:bold;
}

.logout{
background:#ef4444;
color:white;
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

header{
background:linear-gradient(135deg,#22c55e,#0ea5e9);
padding:50px 20px;
text-align:center;
}

header h1{
font-size:38px;
margin-bottom:10px;
}

header p{
font-size:18px;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
background:#1e293b;
padding:25px;
border-radius:18px;
text-align:center;
}

.stat h2{
font-size:32px;
color:#22c55e;
margin-bottom:8px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:18px;
text-align:center;
text-decoration:none;
color:white;
transition:.3s;
border:1px solid #334155;
}

.card:hover{
transform:translateY(-8px);
background:#22c55e;
color:black;
}

.icon{
font-size:50px;
margin-bottom:15px;
}

.footer{
text-align:center;
padding:25px;
margin-top:30px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="topbar">

<div class="school">
🏫 مدرسة قفلة للتعليم الأساسي
</div>

<button class="logout" onclick="logout()">
🚪 تسجيل خروج
</button>

</div>

<header>

<h1>نظام مدرسة قفلة الذكي</h1>

<p>
إدارة الطلاب • الحضور • الدرجات • الشهادات
</p>

</header>

<div class="container">

<div class="stats">

<div class="stat">
<h2>250</h2>
<p>الطلاب</p>
</div>

<div class="stat">
<h2>18</h2>
<p>المعلمون</p>
</div>

<div class="stat">
<h2>2027</h2>
<p>العام الدراسي</p>
</div>

<div class="stat">
<h2>100%</h2>
<p>جاهزية النظام</p>
</div>

</div>

<div class="grid">

<a class="card" href="students.html">
<div class="icon">👨‍🎓</div>
<h3>إدارة الطلاب</h3>
</a>

<a class="card" href="grades.html">
<div class="icon">📝</div>
<h3>الدرجات</h3>
</a>

<a class="card" href="attendance.html">
<div class="icon">📅</div>
<h3>الحضور والغياب</h3>
</a>

<a class="card" href="certificate.html">
<div class="icon">🎓</div>
<h3>الشهادات</h3>
</a>

<a class="card" href="results.html">
<div class="icon">📊</div>
<h3>النتائج</h3>
</a>

<a class="card" href="about.html">
<div class="icon">ℹ️</div>
<h3>عن النظام</h3>
</a>

</div>

<div class="footer">
مدرسة قفلة للتعليم الأساسي © 2027
</div>

</div>

<script type="module">

import {
auth,
onAuthStateChanged,
signOut
} from "./firebase.js";

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
