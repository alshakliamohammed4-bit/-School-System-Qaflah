<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:tahoma;
background:#0a0f1f;
color:white;
}

.sidebar{
position:fixed;
right:0;
width:220px;
height:100vh;
background:#111a2e;
padding:15px;
}

.main{
margin-right:220px;
padding:20px;
}

.card{
background:#111a2e;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#1f2a44;
color:white;
}

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
border-radius:8px;
cursor:pointer;
}

.student{
background:#1f2a44;
padding:10px;
margin-top:10px;
border-radius:8px;
border-right:4px solid #38bdf8;
}

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#111a2e;
padding:10px;
border-radius:10px;
text-align:center;
}

.stat h2{color:#38bdf8;}

</style>
</head>

<body>

<div class="sidebar">
<h3>🏫 النظام</h3>
<button onclick="loadStudents()">📋 الطلاب</button>
</div>

<div class="main">

<div class="stats">
<div class="stat">
<h2 id="count">0</h2>
<p>طلاب</p>
</div>
</div>

<div class="card">
<h3>➕ إضافة طالب</h3>

<input id="studentNumber" placeholder="الرقم">
<input id="name" placeholder="الاسم">
<input id="grade" placeholder="الصف">

<button onclick="addStudent()">حفظ</button>

</div>

<div class="card">
<h3>📋 القائمة</h3>
<div id="list"></div>
</div>

</div>

<script type="module">

import { db, collection, addDoc, getDocs, deleteDoc, doc } from "./firebase.js";

/* ADD */
window.addStudent = async function () {

await addDoc(collection(db,"students"),{
studentNumber: studentNumber.value,
name: name.value,
grade: grade.value
});

loadStudents();
}

/* LOAD */
window.loadStudents = async function () {

const list = document.getElementById("list");
list.innerHTML = "";

const data = await getDocs(collection(db,"students"));

document.getElementById("count").innerText = data.size;

data.forEach(d => {

let s = d.data();

list.innerHTML += `
<div class="student">

<b>${s.name}</b><br>
${s.grade}

<br><br>

<button onclick="deleteStudent('${d.id}')">حذف</button>

</div>
`;
});

}

/* DELETE */
window.deleteStudent = async function (id) {
await deleteDoc(doc(db,"students",id));
loadStudents();
}

loadStudents();

</script>

</body>
</html>
