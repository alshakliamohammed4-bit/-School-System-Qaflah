<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شهادات الطلاب</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.form{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#198754;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

.certificate{
background:white;
border:10px solid #0b5ed7;
padding:40px;
max-width:900px;
margin:auto;
text-align:center;
display:none;
}

.school{
font-size:28px;
font-weight:bold;
color:#0b5ed7;
}

.student{
font-size:32px;
font-weight:bold;
margin:20px 0;
}

.grade{
font-size:24px;
color:#198754;
}

@media print{

.form{
display:none;
}

button{
display:none;
}

body{
background:white;
}

}

</style>

</head>

<body>

<div class="form">

<h2>🎓 إصدار شهادة</h2>

<input
id="studentName"
placeholder="اسم الطالب">

<input
id="studentClass"
placeholder="الصف">

<input
id="studentGrade"
placeholder="التقدير">

<button onclick="generateCertificate()">
إنشاء الشهادة
</button>

</div>

<div
class="certificate"
id="certificate">

<div class="school">
🏫 مدرسة قفلة للتعليم الأساسي
</div>

<h2>
شهادة تقدير
</h2>

<p>
تمنح هذه الشهادة للطالب
</p>

<div
class="student"
id="certName">
</div>

<p>
من الصف
</p>

<div
id="certClass">
</div>

<p>
لحصوله على التقدير
</p>

<div
class="grade"
id="certGrade">
</div>

<br><br>

<p>
العام الدراسي 2026 - 2027م
</p>

<br><br>

<button onclick="window.print()">
🖨️ طباعة الشهادة
</button>

</div>

<script>

function generateCertificate(){

const name =
document.getElementById(
"studentName"
).value;

const studentClass =
document.getElementById(
"studentClass"
).value;

const grade =
document.getElementById(
"studentGrade"
).value;

document.getElementById(
"certName"
).innerText =
name;

document.getElementById(
"certClass"
).innerText =
studentClass;

document.getElementById(
"certGrade"
).innerText =
grade;

document.getElementById(
"certificate"
).style.display =
"block";

}

</script>

</body>
</html>
