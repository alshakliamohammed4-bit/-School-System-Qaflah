<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الشهادات</title>

<style>

body{
margin:0;
font-family:'Tahoma',Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#0b5ed7,#22c55e);
padding:30px;
text-align:center;
}

.box{
background:#1e293b;
padding:20px;
margin:20px auto;
width:90%;
max-width:500px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.certificate{
background:white;
color:black;
padding:20px;
margin-top:20px;
border-radius:10px;
text-align:center;
}

.small{
font-size:14px;
opacity:0.8;
}

.print-btn{
background:blue;
margin-top:10px;
}

</style>

</head>

<body>

<header>
<h1>🎓 نظام الشهادات</h1>
<p>إصدار شهادة رسمية للطالب</p>
</header>

<div class="box">

<input id="studentNumber" placeholder="أدخل الرقم المدرسي">

<button onclick="generateCertificate()">
إنشاء الشهادة
</button>

<div id="result"></div>

</div>

<script type="module">

import {
db,
collection,
getDocs
} from "./firebase.js";

const studentsCol = collection(db,"students");
const gradesCol = collection(db,"grades");

/* إنشاء شهادة */
window.generateCertificate = async function(){

let num = document.getElementById("studentNumber").value;

if(!num){
alert("أدخل الرقم المدرسي");
return;
}

/* جلب الطالب */
let students = await getDocs(studentsCol);
let student = null;

students.forEach(s=>{
if(s.data().studentNumber == num){
student = s.data();
}
});

if(!student){
document.getElementById("result").innerHTML =
"❌ الطالب غير موجود";
return;
}

/* حساب المعدل */
let grades = await getDocs(gradesCol);

let total = 0;
let count = 0;

grades.forEach(g=>{
let data = g.data();
if(data.studentNumber == num){
total += Number(data.grade || 0);
count++;
}
});

let avg = count ? (total / count).toFixed(2) : 0;

/* رقم شهادة */
let certNumber = "CERT-" + num + "-" + Date.now();

/* عرض الشهادة */
document.getElementById("result").innerHTML = `
<div class="certificate">

<h2>🏫 مدرسة قفلة للتعليم الأساسي</h2>

<h3>🎓 شهادة إتمام</h3>

<p class="small">يشهد نظام المدرسة بأن الطالب:</p>

<h2>${student.name}</h2>

<p>الصف: ${student.grade}</p>
<p>الشعبة: ${student.section}</p>

<h3>📊 المعدل: ${avg}</h3>

<p class="small">رقم الشهادة: ${certNumber}</p>

<button class="print-btn" onclick="window.print()">
🖨️ طباعة الشهادة
</button>

</div>
`;

}

</script>

</body>

</html>
