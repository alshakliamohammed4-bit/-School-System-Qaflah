<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الشهادات</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.certificate{
background:white;
padding:20px;
margin-top:15px;
border:2px solid green;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<h1>🎓 إصدار الشهادات</h1>

<div class="box">

<input id="name" placeholder="اسم الطالب">
<input id="grade" placeholder="الصف">

<button onclick="generateCert()">إصدار شهادة</button>

</div>

<h2>📄 الشهادة</h2>

<div id="cert"></div>

<script type="module">

import {
db,
collection,
addDoc
} from "./firebase.js";

const col = collection(db,"certificates");


// 🎓 إصدار شهادة
window.generateCert = async function(){

const name = document.getElementById("name").value;
const grade = document.getElementById("grade").value;

const id = "CERT-" + Date.now();

await addDoc(col,{
name: name,
grade: grade,
certId: id,
date: new Date().toLocaleDateString()
});

document.getElementById("cert").innerHTML = `
<div class="certificate">

<h2>🏫 مدرسة قفلة</h2>
<h3>شهادة إتمام</h3>

<p><b>الطالب:</b> ${name}</p>
<p><b>الصف:</b> ${grade}</p>
<p><b>رقم الشهادة:</b> ${id}</p>
<p><b>التاريخ:</b> ${new Date().toLocaleDateString()}</p>

</div>
`;

}

</script>

</body>
</html>
