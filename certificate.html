import { auth, onAuthStateChanged } from "./firebase.js";

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الشهادات</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h1{
text-align:center;
color:green;
}

.box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #ddd;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
cursor:pointer;
}

.certificate{
background:white;
padding:25px;
margin-top:20px;
border:3px solid green;
border-radius:15px;
text-align:center;
position:relative;
}

.logo{
width:80px;
height:80px;
margin:auto;
display:block;
}

.title{
font-size:22px;
font-weight:bold;
color:green;
margin-top:10px;
}

.signature{
margin-top:40px;
display:flex;
justify-content:space-between;
}

.sign-box{
text-align:center;
width:45%;
}

.line{
border-top:1px solid #000;
margin-top:30px;
}
</style>
</head>

<body>

<h1>🎓 إصدار الشهادات</h1>

<div class="box">

<!-- شعار المدرسة -->
<img src="https://i.imgur.com/1Q9Z1ZC.png" class="logo">

<input id="name" placeholder="اسم الطالب">

<select id="gender">
<option value="طالب">طالب</option>
<option value="طالبة">طالبة</option>
</select>

<input id="grade" placeholder="الصف">

<button onclick="generateCert()">إصدار شهادة</button>

</div>

<div id="cert"></div>

<script type="module">

import {
db,
collection,
addDoc
} from "./firebase.js";

const col = collection(db,"certificates");

window.generateCert = async function(){

const name = document.getElementById("name").value;
const grade = document.getElementById("grade").value;
const gender = document.getElementById("gender").value;

const certId = "CERT-" + Date.now();

await addDoc(col,{
name,
grade,
gender,
certId,
date: new Date().toLocaleDateString()
});

document.getElementById("cert").innerHTML = `
<div class="certificate">

<img src="https://i.imgur.com/1Q9Z1ZC.png" class="logo">

<div class="title">🏫 مدرسة قفلة للتعليم الأساسي</div>

<h2>شهادة إتمام الدراسة</h2>

<p>تشهد إدارة المدرسة بأن</p>

<h3>${gender} / ${name}</h3>

<p>قد اجتاز/اجتازت الصف <b>${grade}</b> بنجاح</p>

<p>رقم الشهادة: <b>${certId}</b></p>

<p>التاريخ: ${new Date().toLocaleDateString()}</p>

<div class="signature">

<div class="sign-box">
<div class="line"></div>
<p>مدير المدرسة</p>
<p>أ. محمد مهدي حسين الشكلية</p>
</div>

<div class="sign-box">
<div class="line"></div>
<p>ختم المدرسة</p>
</div>

</div>

</div>
`;

}

</script>

</body>
</html>
