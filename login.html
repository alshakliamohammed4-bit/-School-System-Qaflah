<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0a0f1f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#111a2e;
padding:20px;
border-radius:12px;
width:300px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#38bdf8;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h3>🔐 تسجيل الدخول</h3>

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
</div>

<script type="module">

import { auth, signInWithEmailAndPassword } from "./firebase.js";

window.login = async function () {

const emailVal = document.getElementById("email").value;
const passVal = document.getElementById("password").value;

if (!emailVal || !passVal) {
alert("يرجى إدخال الإيميل وكلمة المرور");
return;
}

try {

await signInWithEmailAndPassword(auth, emailVal, passVal);

alert("تم تسجيل الدخول بنجاح");
location.href = "dashboard.html";

} catch (e) {

console.log("ERROR CODE:", e.code);
console.log("ERROR MESSAGE:", e.message);

let msg = "خطأ في تسجيل الدخول";

if (e.code === "auth/user-not-found") msg = "المستخدم غير موجود";
if (e.code === "auth/wrong-password") msg = "كلمة المرور غير صحيحة";
if (e.code === "auth/invalid-email") msg = "الإيميل غير صحيح";
if (e.code === "auth/operation-not-allowed") msg = "تسجيل الدخول غير مفعل في Firebase";

alert(msg + "\n\n" + e.message);
}

}

</script>

</body>
</html>
