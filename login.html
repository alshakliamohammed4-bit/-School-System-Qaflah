<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول</title>

<style>

body{
margin:0;
font-family:'Tahoma',Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
width:300px;
box-shadow:0 0 10px #000;
}

h2{
text-align:center;
color:#22c55e;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>🔐 تسجيل الدخول</h2>

<input id="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">
دخول
</button>

<div id="error" class="error"></div>

</div>

<script type="module">

import {
auth,
signInWithEmailAndPassword
} from "./firebase.js";

window.login = async function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

window.location.href="dashboard.html";

}catch(err){
document.getElementById("error").innerText="خطأ في تسجيل الدخول";
}

}

</script>

</body>
</html>
