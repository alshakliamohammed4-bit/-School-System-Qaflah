<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#0a0f1f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#111a2e;
padding:20px;
border-radius:12px;
width:300px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
background:#38bdf8;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h3>🔐 تسجيل الدخول</h3>

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
</div>

<script type="module">

import { auth, signInWithEmailAndPassword } from "./firebase.js";

window.login = async function () {
try {
await signInWithEmailAndPassword(auth, email.value, password.value);
location.href = "dashboard.html";
} catch (e) {
alert("خطأ في تسجيل الدخول");
}
}

</script>

</body>
</html>
