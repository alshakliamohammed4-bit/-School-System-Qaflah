<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;text-align:center}
.box{background:white;padding:20px;border-radius:10px;max-width:300px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{width:100%;padding:10px;background:green;color:white;border:none}
</style>
</head>

<body>

<h1>🔐 تسجيل الدخول</h1>

<div class="box">

<input id="email" placeholder="البريد الإلكتروني">
<input id="password" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

</div>

<script type="module">

import { auth, signInWithEmailAndPassword } from "./firebase.js";

window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth, email, password);
window.location.href = "dashboard.html";
}
catch(error){
alert("خطأ في تسجيل الدخول ❌");
}

}

</script>

</body>
</html>
