<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#0b5ed7;
color:white;
border:none;
cursor:pointer;
}

h2{
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>🏫 نظام قفلة المدرسي</h2>

<input
id="email"
type="email"
placeholder="البريد الإلكتروني">

<input
id="password"
type="password"
placeholder="كلمة المرور">

<button onclick="login()">
تسجيل الدخول
</button>

</div>

<script type="module">

import {
auth,
signInWithEmailAndPassword
}
from "./firebase.js";

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("تم تسجيل الدخول بنجاح");

window.location.href="index.html";

}
catch(error){

alert(
"خطأ في تسجيل الدخول: "
+ error.message
);

}

}

</script>

</body>
</html>
