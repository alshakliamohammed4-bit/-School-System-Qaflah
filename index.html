<!DOCTYPE html>
<html lang="ar" dir="rtl">

<style>
body{

header{

color:white;
padding:60px 20px;
text-align:center;
}

header h1{
font-size:32px;
margin-bottom:10px;
}

header p{

}

.btn{
margin-top:20px;
display:inline-block;
background:white;
color:#0b5ed7;
padding:12px 25px;

.container{

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

.card{

.card h3{

footer{

<div class="container">

</div>

<div class="card">

</div>

<div class="card">

</div>

<div class="card">

</div>

</div>
