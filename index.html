<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إدارة الطلاب - نظام قفلة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
color:#22c55e;
}

.stats{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.stat-card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
width:220px;
}

.stat-card h2{
font-size:35px;
color:#22c55e;
}

.form-box{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.form-box h2{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#334155;
color:white;
}

button{
width:100%;
padding:14px;
background:#22c55e;
color:black;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.students-title{
margin:20px 0;
}

.student{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
border-right:5px solid #22c55e;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:10px 15px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<a href="dashboard.html" class="back-btn">
⬅ العودة للوحة التحكم
</a>

<h1>👨‍🎓 إدارة الطلاب</h1>

<div class="stats">
<div class="stat-card">
<h2 id="studentsCount">0</h2>
<p>إجمالي الطلاب</p>
</div>
</div>

<div class="form-box">

<h2>➕ إضافة طالب جديد</h2>

<input id="name" placeholder="اسم الطالب">

<input id="studentClass" placeholder="الصف الدراسي">

<button onclick="addStudent()">
إضافة الطالب
</button>

</div>

<h2 class="students-title">
📋 قائمة الطلاب
</h2>

<div id="students"></div>

</div>

<script type="module">

import {
db,
collection,
addDoc,
getDocs
}
from "./firebase.js";

window.addStudent = async function(){

const name =
document.getElementById("name").value;

const studentClass =
document.getElementById("studentClass").value;

if(!name || !studentClass){

alert("أدخل البيانات كاملة");
return;

}

await addDoc(
collection(db,"students"),
{
name:name,
class:studentClass,
createdAt:new Date().toISOString()
}
);

document.getElementById("name").value="";
document.getElementById("studentClass").value="";

alert("تمت إضافة الطالب");

loadStudents();

}

async function loadStudents(){

const container =
document.getElementById("students");

container.innerHTML="";

const snapshot =
await getDocs(collection(db,"students"));

let count = 0;

snapshot.forEach((doc)=>{

count++;

const s = doc.data();

container.innerHTML += `
<div class="student">
👨‍🎓 ${s.name}
<br>
🏫 الصف: ${s.class}
</div>
`;

});

document.getElementById("studentsCount").textContent = count;

}

loadStudents();

</script>

</body>
</html>
